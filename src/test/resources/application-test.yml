spring:
  datasource:
    url: jdbc:tc:postgresql:15:///pettrack_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-on-validation-error: true
    clean-disabled: false

pettrack:
  jwt:
    secret: test-secret-key-pettrack-256bits-apenas-para-testes
    expiration-ms: 3600000

logging:
  level:
    com.pettrack: DEBUG